<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self'; style-src 'self'; script-src 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexxCloud Desktop</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="brand">
        <img src="./nexxcloud-icon.png" alt="" class="logo">
        <div>
          <p class="eyebrow">Desktop</p>
          <h1>NexxCloud</h1>
        </div>
        <span class="indicator searching" id="indicator"></span>
      </header>

      <section class="status">
        <p class="label">Connection</p>
        <p class="status-title" id="statusTitle">Searching</p>
        <p class="status-detail" id="statusDetail">Looking for a local server.</p>
      </section>

      <form class="connection" id="connection">
        <label class="field">
          <span>Server Address</span>
          <div class="address-row">
            <input id="serverUrl" type="text" placeholder="http://localhost:3000" spellcheck="false" required>
            <button class="primary" type="submit" id="connect">Connect</button>
          </div>
        </label>
        <div class="recent hidden" id="recentSection">
          <p class="label">Recent Servers</p>
          <div class="recent-list" id="recentServers"></div>
        </div>
      </form>

      <section class="settings">
        <label class="toggle">
          <input type="checkbox" id="autoStart">
          <span>Launch at startup</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="autoReconnect">
          <span>Reconnect automatically</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="minimizeToTray">
          <span>Minimize to tray</span>
        </label>
      </section>

      <div class="actions">
        <button class="secondary hidden" id="returnToApp" type="button">Open App</button>
        <button class="secondary" id="retry" type="button">Retry</button>
        <button class="link" id="clearCache" type="button">Clear Cache</button>
        <button class="link" id="openLogs" type="button">Logs</button>
        <button class="link danger" id="resetApp" type="button">Reset</button>
      </div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
