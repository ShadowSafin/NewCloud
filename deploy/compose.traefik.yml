# Usage:
#   docker network create proxy
#   NEXXCLOUD_DOMAIN=cloud.example.com docker compose -f docker-compose.yml \
#     -f deploy/compose.traefik.yml up -d --build
#
# Traefik handles HTTPS and forwards normal traffic to the frontend. WebSocket upgrades
# are routed directly to the API because the Next.js rewrite covers only /api routes.
services:
  frontend:
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.nexxcloud.rule=Host(`${NEXXCLOUD_DOMAIN:?Set NEXXCLOUD_DOMAIN}`)
      - traefik.http.routers.nexxcloud.entrypoints=websecure
      - traefik.http.routers.nexxcloud.tls=true
      - traefik.http.services.nexxcloud.loadbalancer.server.port=3000

  backend:
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.nexxcloud-ws.rule=Host(`${NEXXCLOUD_DOMAIN:?Set NEXXCLOUD_DOMAIN}`) && Path(`/ws`)
      - traefik.http.routers.nexxcloud-ws.entrypoints=websecure
      - traefik.http.routers.nexxcloud-ws.tls=true
      - traefik.http.routers.nexxcloud-ws.priority=100
      - traefik.http.services.nexxcloud-ws.loadbalancer.server.port=4000

networks:
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
