services:
  postgres:
    image: postgres:16-alpine
    container_name: cloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-clouduser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cloudpass}
      POSTGRES_DB: ${DB_NAME:-cloudstorage}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clouduser} -d ${DB_NAME:-cloudstorage}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cloud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgresql://${DB_USER:-clouduser}:${DB_PASSWORD:-cloudpass}@postgres:5432/${DB_NAME:-cloudstorage}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      MEDIA_TOKEN_SECRET: ${MEDIA_TOKEN_SECRET:?MEDIA_TOKEN_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      STORAGE_ROOT: /app/data/storage
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-1099511627776}
      UPLOAD_CHUNK_SIZE: ${UPLOAD_CHUNK_SIZE:-16777216}
      MAX_UPLOAD_CHUNK_SIZE: ${MAX_UPLOAD_CHUNK_SIZE:-268435456}
      BLOCK_DANGEROUS_UPLOADS: ${BLOCK_DANGEROUS_UPLOADS:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      TRASH_RETENTION_DAYS: ${TRASH_RETENTION_DAYS:-30}
      MAX_VERSIONS_PER_FILE: ${MAX_VERSIONS_PER_FILE:-10}
      DEFAULT_STORAGE_QUOTA: ${DEFAULT_STORAGE_QUOTA:-10737418240}
      CHUNK_UPLOAD_CONCURRENCY: ${CHUNK_UPLOAD_CONCURRENCY:-3}
      MAX_FILES_PER_USER: ${MAX_FILES_PER_USER:-100000}
      MAX_UPLOADS_PER_MINUTE: ${MAX_UPLOADS_PER_MINUTE:-30}
      BULL_BOARD_USERNAME: ${BULL_BOARD_USERNAME:-admin}
      BULL_BOARD_PASSWORD: ${BULL_BOARD_PASSWORD:?BULL_BOARD_PASSWORD is required}
      HOST_LAN_IP: ${HOST_LAN_IP}
      HOST_HOSTNAME: ${HOST_HOSTNAME}
    volumes:
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        INTERNAL_API_URL: http://cloud-backend:4000
    container_name: cloud-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://cloud-backend:4000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloud-worker
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-clouduser}:${DB_PASSWORD:-cloudpass}@postgres:5432/${DB_NAME:-cloudstorage}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      MEDIA_TOKEN_SECRET: ${MEDIA_TOKEN_SECRET:?MEDIA_TOKEN_SECRET is required}
      STORAGE_ROOT: /app/data/storage
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-1099511627776}
      UPLOAD_CHUNK_SIZE: ${UPLOAD_CHUNK_SIZE:-16777216}
      MAX_UPLOAD_CHUNK_SIZE: ${MAX_UPLOAD_CHUNK_SIZE:-268435456}
      BLOCK_DANGEROUS_UPLOADS: ${BLOCK_DANGEROUS_UPLOADS:-false}
      TRASH_RETENTION_DAYS: ${TRASH_RETENTION_DAYS:-30}
      MAX_VERSIONS_PER_FILE: ${MAX_VERSIONS_PER_FILE:-10}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'node.*worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: node dist/worker.js

volumes:
  postgres_data:
  redis_data:
