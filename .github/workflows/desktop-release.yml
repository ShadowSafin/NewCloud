name: Windows Desktop Client

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows Desktop Installer
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install packaging dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop installer
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npm run dist:windows

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexxCloud Desktop Windows
          path: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest.yml
          if-no-files-found: error

      - name: Attach artifact to tagged release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.exe
            desktop/release/*.blockmap
            desktop/release/latest.yml
