<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NexxCloud Server</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="brand">
        <img src="./nexxcloud-icon.png" alt="" class="logo">
        <div>
          <p class="eyebrow">Native Server</p>
          <h1>NexxCloud</h1>
        </div>
        <span class="indicator" id="indicator"></span>
      </header>

      <section class="status" id="statusPanel">
        <div>
          <p class="label">Server Status</p>
          <p class="status-title" id="statusTitle">Not configured</p>
          <p class="status-detail" id="statusDetail">Choose a data location to begin.</p>
          <p class="lan-urls hidden" id="lanUrls"></p>
        </div>
        <button class="secondary hidden" id="openDashboard">Open Dashboard</button>
      </section>

      <form class="configuration" id="configuration">
        <h2>Server Setup</h2>
        <label class="field">
          <span>Where should NexxCloud store your data?</span>
          <div class="path-row">
            <input id="dataDirectory" type="text" placeholder="D:\NexxCloudData or /home/user/NexxCloudData" required>
            <button class="picker" id="chooseDirectory" type="button">Browse</button>
          </div>
          <small>Use an SSD, HDD, NAS mount, or external drive.</small>
        </label>
        <label class="field compact">
          <span>Dashboard Port</span>
          <input id="frontendPort" type="number" min="1024" max="65534" value="3000" required>
        </label>
        <label class="toggle">
          <input id="autoStart" type="checkbox" checked>
          <span>Start NexxCloud automatically when I sign in</span>
        </label>
        <label class="toggle">
          <input id="openBrowser" type="checkbox" checked>
          <span>Open my dashboard after startup</span>
        </label>
        <button class="primary" id="saveAndStart" type="submit">Save and Start Server</button>
      </form>

      <section class="controls hidden" id="controls">
        <button class="primary" id="startServer">Start Server</button>
        <button class="secondary" id="restartServer">Restart</button>
        <button class="secondary" id="stopServer">Stop</button>
        <div class="utility">
          <button class="link" id="openData" type="button">Open Data Folder</button>
          <button class="link" id="openLogs" type="button">Open Logs</button>
          <button class="link" id="createBackup" type="button">Create Backup</button>
          <button class="link" id="editSettings" type="button">Edit Setup</button>
        </div>
      </section>

      <section class="logs hidden" id="logsPanel">
        <div class="logs-header">
          <div>
            <p class="label">Live Logs</p>
            <h2>Service Output</h2>
          </div>
          <button class="link" id="clearLogs" type="button">Clear</button>
        </div>
        <div class="log-output" id="logOutput" role="log" aria-live="polite">Waiting for server output...</div>
      </section>

    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
